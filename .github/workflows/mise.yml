---
name: Test using mise

"on":
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
  #  branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

# this allows a subsequently queued workflow run to interrupt previous runs in pull requests only
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  mise:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install astyle (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install --yes astyle

      - name: Install astyle (macOS)
        if: runner.os == 'macOS'
        run: brew install astyle

      - name: Install astyle (Windows)
        if: runner.os == 'Windows'
        run: choco install --yes astyle

      - name: Install mise
        uses: taiki-e/install-action@v2
        with:
          tool: mise

      - name: Install tools
        run: |
          mise settings add idiomatic_version_file_enable_tools "[]"
          mise settings experimental=true
          mise settings set cargo.binstall true
          mise use -g cargo-binstall
          mise install
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # GitHub release downloads occasionally take longer than mise's
          # default 30s HTTP timeout; bump it so transient network slowness
          # doesn't fail the whole `mise install` step.
          MISE_HTTP_TIMEOUT: "120"

      - name: Setup
        run: |
          mise run setup

      # Distinguish "installed but not on the native PATH" from "not installed"
      # for the language formatters the test suite invokes as subprocesses.
      # `mise which` resolves via mise's installed tools (install check);
      # `which`/PATH shows what a spawned process actually sees.
      - name: Debug tool resolution (Windows)
        if: runner.os == 'Windows'
        run: |
          mise ls
          echo "PATH=$PATH"
          for t in dub v dart gofmt clang-format rustfmt nimpretty mojo; do
            echo "== $t =="
            mise which "$t" || echo "  mise cannot resolve (not installed?): $t"
            which "$t" || echo "  not on PATH: $t"
          done

      - name: Lint
        run: |
          mise run lint

      - name: Test
        run: |
          mise run test
