[tox]
envlist = py3{9,10,11,12,13}-{full,cpp,dart,go,julia,kotlin,nim,smt,vlang,dlang,mojo,zig,rust}
skip_missing_interpreters = true

[testenv]
passenv =
    HOME
    LocalAppData
    CI
    CXX
    CXXFLAGS
    VFLAGS
    CLANG_FORMAT_STYLE
    UPDATE_EXPECTED
    KEEP_GENERATED
    SHOW_ERRORS
    LINT
    GOPATH
    GOCACHE
    JAVA_HOME
    KOTLIN_HOME
    FOCUS
    MISE_DATA_DIR
    OS
    PYTEST_ADDOPTS
# Per-OS coverage target: Windows runs fewer language backends (several tools
# lack Windows support), so it can't reach the full-platform target. Windows
# always sets OS=Windows_NT; other OSes leave OS unset, selecting the "_" key.
set_env =
    COV_FAIL_UNDER_ = 88
    COV_FAIL_UNDER_Windows_NT = 85.5
deps =
    py38: importlib-resources
    pytest-cov
    pytest-xdist
    black
    astpretty
    jgo<2
    argparse_dataclass
    git+https://github.com/adsharma/adt/
    full: git+https://github.com/adsharma/Typpete/
changedir = tests
commands =
    pytest -n auto --junitxml=current-results.xml --import-mode=importlib --tb=native --assert=plain --ignore=expected --ignore=ext_expected --cov=py2many --cov-report=term-missing:skip-covered -rs -v {posargs:--cov-fail-under={env:COV_FAIL_UNDER_{env:OS:}}}
